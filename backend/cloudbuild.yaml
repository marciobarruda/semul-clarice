steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/clarice-portal:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/clarice-portal:latest'
      - '.'
    dir: 'backend'

  # 2. Push para o Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/clarice-portal'
    waitFor: ['build']

  # 3. Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'clarice-portal'
      - '--image=gcr.io/$PROJECT_ID/clarice-portal:$COMMIT_SHA'
      - '--region=southamerica-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=60'
      - '--set-env-vars=NODE_ENV=production'
      # As variáveis sensíveis (DB_PASSWORD, KC_CLIENT_SECRET, etc.)
      # devem ser configuradas manualmente via Console ou pelo script deploy.sh
    waitFor: ['push']

images:
  - 'gcr.io/$PROJECT_ID/clarice-portal:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/clarice-portal:latest'

options:
  logging: CLOUD_LOGGING_ONLY
