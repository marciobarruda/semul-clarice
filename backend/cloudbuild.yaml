steps:
  # 1. Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/semul-clarice:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/semul-clarice:latest'
      - '.'
    dir: 'backend'

  # 2. Push para o Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/semul-clarice'
    waitFor: ['build']

  # 3. Deploy no Cloud Run (serviço: semul-clarice, região: us-west1)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'semul-clarice'
      - '--image=gcr.io/$PROJECT_ID/semul-clarice:$COMMIT_SHA'
      - '--region=us-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--timeout=60'
      - '--set-env-vars=NODE_ENV=production'
    waitFor: ['push']

images:
  - 'gcr.io/$PROJECT_ID/semul-clarice:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/semul-clarice:latest'

options:
  logging: CLOUD_LOGGING_ONLY
